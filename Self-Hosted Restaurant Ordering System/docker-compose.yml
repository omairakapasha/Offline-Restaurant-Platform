services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: omairrauf/self-hosted-restaurant-ordering-system-api:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/restaurant
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5000}
      BRAND_NAME: ${BRAND_NAME:-The Corner Table}
      BRAND_TAGLINE: ${BRAND_TAGLINE:-Scan · Order · Enjoy}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@restaurant.local}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      AI_SERVICE_URL: http://ai-chat:8001
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_KITCHEN_USERNAME: ${DEFAULT_KITCHEN_USERNAME:-kitchen}
      DEFAULT_KITCHEN_PASSWORD: ${DEFAULT_KITCHEN_PASSWORD}
      DEFAULT_WAITER_USERNAME: ${DEFAULT_WAITER_USERNAME:-waiter}
      DEFAULT_WAITER_PASSWORD: ${DEFAULT_WAITER_PASSWORD:-}
    volumes:
      - menu_images:/app/Menu_Item_Images
    depends_on:
      db:
        condition: service_healthy

  ai-chat:
    image: omairrauf/self-hosted-restaurant-ordering-system-ai-chat:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/restaurant
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  menu_images:
